<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>药品 × KOL 桑基图 - 商业化合作分析</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {

}
.header {

    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.header h1 { font-size: 24px; margin-bottom: 6px; }
.header .subtitle { font-size: 14px; opacity: 0.9; }
.stats-bar {
    display: flex;
    gap: 24px;
    margin-top: 16px;
    flex-wrap: wrap;
}
.stat-item {
    background: rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 8px 16px;
    backdrop-filter: blur(4px);
}
.stat-item .label { font-size: 12px; opacity: 0.85; }
.stat-item .value { font-size: 20px; font-weight: 700; }
.controls {
    background: white;
    padding: 16px 40px;
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid #e8e8e8;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.control-group {
    display: flex;
    align-items: center;
    gap: 8px;
}
.control-group label {
    font-size: 13px;
    color: #666;
    white-space: nowrap;
    font-weight: 500;
}
.control-group input[type="range"] {
    width: 180px;
    accent-color: #667eea;
}
.control-group input[type="text"] {
    padding: 6px 12px;
    border: 1px solid #d9d9d9;
    border-radius: 6px;
    font-size: 13px;
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
}
.control-group input[type="text"]:focus {
    border-color: #667eea;
}
.control-group select {
    padding: 6px 12px;
    border: 1px solid #d9d9d9;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    background: white;
}
.btn {
    padding: 6px 16px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
}
.btn-primary {
    background: #667eea;
    color: white;
}
.btn-primary:hover { background: #5a6fd8; }
.btn-ghost {
    background: #f0f0f0;
    color: #666;
}
.btn-ghost:hover { background: #e0e0e0; }
.value-display {
    font-size: 13px;
    font-weight: 600;
    color: #667eea;
    min-width: 30px;
}
.chart-container {
    padding: 20px 40px;
    background: white;
    margin: 16px 40px;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
#chart {
    width: 100%;
    height: 900px;
    min-height: 600px;
}
.legend {
    display: flex;
    gap: 24px;
    padding: 0 40px 8px;
    align-items: center;
    flex-wrap: wrap;
}
.legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #666;
}
.legend-color {
    width: 14px;
    height: 14px;
    border-radius: 3px;
}
.info-panel {
    margin: 0 40px 24px;
    background: white;
    border-radius: 12px;
    padding: 16px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: none;
}
.info-panel.active { display: block; }
.info-panel h3 {
    font-size: 15px;
    margin-bottom: 8px;
    color: #333;
}
.info-panel .info-content {
    font-size: 13px;
    color: #666;
    line-height: 1.8;
}
.info-panel .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    margin: 2px 4px 2px 0;
}
.tag-drug { background: #e8f4fd; color: #1890ff; }
.tag-kol { background: #fff7e6; color: #fa8c16; }
.footer {
    text-align: center;
    padding: 20px;
    color: #999;
    font-size: 12px;
}
@media (max-width: 768px) {
    .header, .controls, .chart-container, .legend, .info-panel { padding-left: 16px; padding-right: 16px; margin-left: 8px; margin-right: 8px; }
    #chart { height: 600px; }
}
</style>
</head>
<body>

<div class="header">

    <div class="control-group">
        <button class="btn btn-primary" onclick="renderChart()">应用筛选</button>

    </div>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background:#5B8FF9;"></div> 药品名称</div>
    <div class="legend-item"><div class="legend-color" style="background:#F6BD16;"></div> KOL姓名</div>

</div>

<div class="info-panel" id="infoPanel">

</div>

<div class="chart-container">

</div>

<div class="footer">

</div>

function getFilteredData() {
    const kolLimit = parseInt(document.getElementById('kolSlider').value);
    const searchText = document.getElementById('searchInput').value.trim().toLowerCase();
    const minLink = parseInt(document.getElementById('minLinkSelect').value);

    // Sort drugs by kol_count descending, KOLs by drug_count descending
    const allDrugNodes = rawData.nodes.filter(function(n) { return n.type === 'drug'; })
        .sort(function(a, b) { return b.kol_count - a.kol_count; });
    const allKolNodes = rawData.nodes.filter(function(n) { return n.type === 'kol'; })
        .sort(function(a, b) { return b.drug_count - a.drug_count; });

    var filteredKolNodes = allKolNodes.slice(0, kolLimit);
    var kolNames = new Set(filteredKolNodes.map(function(n) { return n.name; }));

    var filteredLinks = rawData.links.filter(function(l) {
        if (l.value < minLink) return false;
        if (!kolNames.has(l.target)) return false;
        return true;
    });

    if (searchText) {
        var matchingDrugs = new Set(allDrugNodes.filter(function(n) { return n.name.toLowerCase().indexOf(searchText) >= 0; }).map(function(n) { return n.name; }));
        var matchingKols = new Set(filteredKolNodes.filter(function(n) { return n.name.toLowerCase().indexOf(searchText) >= 0; }).map(function(n) { return n.name; }));

        var connectedLinks = filteredLinks.filter(function(l) {
            return matchingDrugs.has(l.source) || matchingKols.has(l.target);
        });

        if (connectedLinks.length > 0) {
            filteredLinks = connectedLinks;
            var usedDrugs = new Set(connectedLinks.map(function(l) { return l.source; }));
            var usedKols = new Set(connectedLinks.map(function(l) { return l.target; }));
            return {
                drugNodes: allDrugNodes.filter(function(n) { return usedDrugs.has(n.name); }),
                kolNodes: filteredKolNodes.filter(function(n) { return usedKols.has(n.name); }),
                links: filteredLinks
            };
        }
    }

    var usedDrugs = new Set(filteredLinks.map(function(l) { return l.source; }));
    var usedKols = new Set(filteredLinks.map(function(l) { return l.target; }));

    return {
        drugNodes: allDrugNodes.filter(function(n) { return usedDrugs.has(n.name); }),
        kolNodes: filteredKolNodes.filter(function(n) { return usedKols.has(n.name); }),
        links: filteredLinks
    };
}

function buildSankeyData(filtered) {
    var echartsNodes = [];

    filtered.drugNodes.forEach(function(node) {
        echartsNodes.push({
            name: node.name,
            depth: 0,
            itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                    { offset: 0, color: '#5B8FF9' },
                    { offset: 1, color: '#3D6FCC' }
                ]),
                borderColor: '#2B5BA8',
                borderWidth: 1
            },
            label: {
                show: true,
                position: 'left',
                formatter: function() {
                    return '{name|' + node.name + '}\n{sub|关联' + node.kol_count + '位KOL | ' + node.count + '篇}';
                },
                rich: {
                    name: { fontSize: 13, fontWeight: 'bold', color: '#333', lineHeight: 20 },
                    sub: { fontSize: 11, color: '#999', lineHeight: 16 }
                }
            },
            _rawData: node
        });
    });

    filtered.kolNodes.forEach(function(node) {
        echartsNodes.push({
            name: node.name,
            depth: 1,
            itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                    { offset: 0, color: '#F6BD16' },
                    { offset: 1, color: '#D9A20A' }
                ]),
                borderColor: '#B8860B',
                borderWidth: 1
            },
            label: {
                show: true,
                position: 'right',
                formatter: function() {
                    return '{name|' + node.name + '}\n{sub|关联' + node.drug_count + '种药品}';
                },
                rich: {
                    name: { fontSize: 12, fontWeight: 'bold', color: '#333', lineHeight: 18 },
                    sub: { fontSize: 10, color: '#999', lineHeight: 14 }
                }
            },
            _rawData: node
        });
    });

    var echartsLinks = filtered.links.map(function(l) {
        return {
            source: l.source,
            target: l.target,
            value: l.value,
            lineStyle: {
                color: 'gradient',
                opacity: 0.4,
                curveness: 0.5
            }
        };
    });

    return { nodes: echartsNodes, links: echartsLinks };
}

function renderChart() {
    var filtered = getFilteredData();
    var sankeyData = buildSankeyData(filtered);

    var option = {
        tooltip: {
            trigger: 'item',
            triggerOn: 'mousemove',
            formatter: function(params) {
                if (params.dataType === 'node') {
                    var d = params.data._rawData;
                    if (d.type === 'drug') {
                        return '<div style="font-weight:bold;font-size:14px;margin-bottom:4px;">' + d.name + '</div>' +
                               '<div>类型: 药品</div>' +
                               '<div>出现文章数: ' + d.count + ' 篇</div>' +
                               '<div>关联KOL数: ' + d.kol_count + ' 位</div>';
                    } else {
                        return '<div style="font-weight:bold;font-size:14px;margin-bottom:4px;">' + d.name + '</div>' +
                               '<div>类型: KOL</div>' +
                               '<div>关联药品数: ' + d.drug_count + ' 种</div>';
                    }
                } else if (params.dataType === 'edge') {
                    return '<div style="font-weight:bold;">' + params.data.source + ' → ' + params.data.target + '</div>' +
                           '<div>共同出现文章数: ' + params.data.value + ' 篇</div>';
                }
                return '';
            }
        },
        series: [{
            type: 'sankey',
            data: sankeyData.nodes,
            links: sankeyData.links,
            left: 200,
            right: 200,
            top: 20,
            bottom: 20,
            nodeWidth: 22,
            nodeGap: 8,
            nodeAlign: 'justify',
            layoutIterations: 0,
            orient: 'horizontal',
            draggable: true,
            emphasis: {
                focus: 'adjacency',
                blurScope: 'coordinateSystem'
            },
            label: {
                show: true
            },
            lineStyle: {
                color: 'gradient',
                curveness: 0.5,
                opacity: 0.35
            },
            levels: [{
                depth: 0,
                itemStyle: { color: '#5B8FF9' },
                lineStyle: { color: 'gradient', opacity: 0.4 }
            }, {
                depth: 1,
                itemStyle: { color: '#F6BD16' },
                lineStyle: { color: 'gradient', opacity: 0.4 }
            }],
            animationDuration: 1000,
            animationEasing: 'cubicOut'
        }]
    };

    if (myChart) {
        myChart.dispose();
    }
    myChart = echarts.init(document.getElementById('chart'));
    myChart.setOption(option);

    myChart.off('click');
    myChart.on('click', function(params) {
        if (params.dataType === 'node') {
            showInfoPanel(params.data._rawData);
        }
    });

    var totalNodes = sankeyData.nodes.length;
    var calculatedHeight = Math.max(600, totalNodes * 18);
    document.getElementById('chart').style.height = calculatedHeight + 'px';
    myChart.resize();
}

function showInfoPanel(node) {
    var panel = document.getElementById('infoPanel');
    var title = document.getElementById('infoTitle');
    var content = document.getElementById('infoContent');

    title.textContent = node.name;

    var connectedLinks = rawData.links.filter(function(l) {
        return l.source === node.name || l.target === node.name;
    });

    var html = '';
    if (node.type === 'drug') {
        html += '<div style="margin-bottom:8px;"><span class="tag tag-drug">药品</span> ' +
                '出现文章数: <strong>' + node.count + '</strong> 篇 | ' +
                '关联KOL数: <strong>' + node.kol_count + '</strong> 位</div>';

        var kolLinks = connectedLinks
            .filter(function(l) { return l.source === node.name; })
            .sort(function(a, b) { return b.value - a.value; })
            .slice(0, 30);

        if (kolLinks.length > 0) {
            html += '<div>关联KOL (前30位):</div><div>';
            kolLinks.forEach(function(l) {
                html += '<span class="tag tag-kol">' + l.target + ' (' + l.value + '篇)</span>';
            });
            html += '</div>';
        }
    } else {
        html += '<div style="margin-bottom:8px;"><span class="tag tag-kol">KOL</span> ' +
                '关联药品数: <strong>' + node.drug_count + '</strong> 种</div>';

        var drugLinks = connectedLinks
            .filter(function(l) { return l.target === node.name; })
            .sort(function(a, b) { return b.value - a.value; });

        if (drugLinks.length > 0) {
            html += '<div>关联药品:</div><div>';
            drugLinks.forEach(function(l) {
                html += '<span class="tag tag-drug">' + l.source + ' (' + l.value + '篇)</span>';
            });
            html += '</div>';
        }
    }

    content.innerHTML = html;
    panel.classList.add('active');
}

    document.getElementById('kolSlider').value = 50;
    document.getElementById('kolValue').textContent = '50';
    document.getElementById('searchInput').value = '';
    document.getElementById('minLinkSelect').value = '1';
    document.getElementById('infoPanel').classList.remove('active');
    renderChart();
}

document.getElementById('kolSlider').addEventListener('input', function() {
    document.getElementById('kolValue').textContent = this.value;
});

document.getElementById('searchInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') renderChart();
});

window.addEventListener('resize', function() {
    if (myChart) myChart.resize();
});

initStats();
renderChart();
</script>

</body>
</html>
