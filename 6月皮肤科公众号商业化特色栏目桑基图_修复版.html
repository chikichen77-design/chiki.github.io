            "颜色": "#8b5cf6"
        },
        {
            "栏目名称": "领航者对话",
            "所属公众号": "优麦会讯",
            "月发布频次": 3,
            "平均阅读量": 2204,
            "颜色": "#f97316"
        },
        {
            "栏目名称": "超话星期二",
            "所属公众号": "优麦会讯",
            "月发布频次": 1,
            "平均阅读量": 1589,
            "颜色": "#f97316"
        },
        {
            "栏目名称": "病例小课堂",
            "所属公众号": "优麦会讯",
            "月发布频次": 4,
            "平均阅读量": 1214,
            "颜色": "#f97316"
        },
        {
            "栏目名称": "氘可道，例可名",
            "所属公众号": "优麦会讯",
            "月发布频次": 10,
            "平均阅读量": 536,
            "颜色": "#f97316"
        }
    ]
};

        // 初始化桑基图
        const sankeyChart = echarts.init(document.getElementById('sankey-chart'));
        const countBarChart = echarts.init(document.getElementById('count-bar'));
        const readBarChart = echarts.init(document.getElementById('read-bar'));

        // 生成筛选按钮
        const accounts = rawData.nodes.filter(n => n.depth === 0).map(n => n.name);
        const filterContainer = document.getElementById('filterButtons');
        accounts.forEach(acc => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.dataset.account = acc;
            btn.textContent = acc;
            btn.style.borderColor = rawData.nodes.find(n => n.name === acc).itemStyle.color;
            filterContainer.appendChild(btn);
        });

        // 当前筛选账号
        let currentAccount = '全部账号';

        // 获取筛选后的数据
        function getFilteredData(account) {
            if (account === '全部账号') {
                return {
                    nodes: JSON.parse(JSON.stringify(rawData.nodes)),
                    links: JSON.parse(JSON.stringify(rawData.links))
                };
            }
            // 筛选该账号下的栏目和对应内容类型
            const columns = Object.keys(rawData.column_account_map).filter(
                col => rawData.column_account_map[col] === account
            );
            const types = new Set();
            const filteredLinks = rawData.links.filter(l => {
                if (l.source === account) return columns.includes(l.target);
                if (columns.includes(l.source)) {
                    types.add(l.target);
                    return true;
                }
                return false;
            });
            const filteredNodes = rawData.nodes.filter(n => {
                if (n.depth === 0) return n.name === account;
                if (n.depth === 1) return columns.includes(n.name);
                if (n.depth === 2) return types.has(n.name);
                return false;
            });
            return {nodes: filteredNodes, links: filteredLinks};
        }

        // 渲染桑基图
        function renderSankey(account) {
            const data = getFilteredData(account);
            // 处理节点标签
            const nodes = data.nodes.map(n => {
                let label = n.name;
                if (n.depth === 0) {
                    const colCount = Object.keys(rawData.column_account_map).filter(
                        col => rawData.column_account_map[col] === n.name
                    ).length;
                    label = n.name + '\n共' + colCount + '个特色栏目';
                } else if (n.depth === 1) {
                    const count = rawData.column_info[n.name].发布频次;
                    label = n.name + ' ' + count + '篇';
                }
                return {
                    ...n,
                    label: {
                        show: true,
                        formatter: label,
                        fontSize: 12
                    }
                };
            });

            const option = {
                tooltip: {
                    trigger: 'item',
                    triggerOn: 'mousemove',
                    formatter: function(params) {
                        if (params.dataType === 'node') {
                            const name = params.name;
                            if (rawData.column_info[name]) {
                                // 栏目节点
                                const acc = rawData.column_account_map[name];
                                const info = rawData.column_info[name];
                                return '<div style="font-weight:600;margin-bottom:4px">' + name + '</div>' +
                                        '<div>所属公众号：' + acc + '</div>' +
                                        '<div>月发布频次：' + info.发布频次 + '篇</div>' +
                                        '<div>单篇平均阅读量：' + info.平均阅读量 + '</div>';
                            } else if (accounts.includes(name)) {
                                // 公众号节点
                                const cols = Object.keys(rawData.column_account_map).filter(
                                    col => rawData.column_account_map[col] === name
                                );
                                const totalCount = cols.reduce((sum, col) => sum + rawData.column_info[col].发布频次, 0);
                                const totalRead = cols.reduce((sum, col) => sum + rawData.column_info[col].发布频次 * rawData.column_info[col].平均阅读量, 0);
                                const avgRead = Math.round(totalRead / totalCount);
                                return '<div style="font-weight:600;margin-bottom:4px">' + name + '</div>' +
                                        '<div>商业化特色栏目数：' + cols.length + '个</div>' +
                                        '<div>月总发布篇数：' + totalCount + '篇</div>' +
                                        '<div>整体平均阅读量：' + avgRead + '</div>';
                            } else {
                                // 内容类型节点
                                const total = data.links.filter(l => l.target === name).reduce((sum, l) => sum + l.value, 0);
                                return '<div style="font-weight:600;margin-bottom:4px">' + name + '</div>' +
                                        '<div>对应栏目总发布篇数：' + total + '篇</div>';
                            }
                        } else {
                            // 连线
                            return params.data.source + ' → ' + params.data.target + '<br/>发布篇数：' + params.data.value + '篇';
                        }
                    }
                },
                series: [{
                    type: 'sankey',
                    data: nodes,
                    links: data.links,
                    left: '5%',
                    right: '18%',
                    top: '5%',
                    bottom: '5%',
                    nodeWidth: 20,
                    nodeGap: 12,
                    draggable: true,
                    emphasis: {
                        focus: 'adjacency'
                    },
                    lineStyle: {
                        curveness: 0.5
                    }
                }]
            };
            sankeyChart.setOption(option, true);
        }

        // 渲染条形图
        function renderBars(highlightCol = null) {
            // 发布频次条形图
            const countData = currentAccount === '全部账号' ? rawData.rank_by_count : 
                rawData.rank_by_count.filter(d => d.所属公众号 === currentAccount);
            const countNames = countData.map(d => d.栏目名称).reverse();
            const countValues = countData.map(d => d.月发布频次).reverse();
            const countColors = countData.map(d => d.颜色).reverse();

            countBarChart.setOption({
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {type: 'shadow'},
                    formatter: function(params) {
                        const d = countData.find(item => item.栏目名称 === params[0].name);
                        return '<div style="font-weight:600;margin-bottom:4px">' + d.栏目名称 + '</div>' +
                                '<div>所属公众号：' + d.所属公众号 + '</div>' +
                                '<div>月发布频次：' + d.月发布频次 + '篇</div>' +
                                '<div>平均阅读量：' + d.平均阅读量 + '</div>';
                    }
                },
                grid: {left: 120, right: 40, top: 10, bottom: 30},
                xAxis: {type: 'value', name: '发布篇数'},
                yAxis: {type: 'category', data: countNames, axisLabel: {fontSize: 11}},
                series: [{
                    type: 'bar',
                    data: countValues.map((v, i) => ({
                        value: v,
                        itemStyle: {
                            color: highlightCol === countNames[i] ? countColors[i] : countColors[i] + '99',
                            borderWidth: highlightCol === countNames[i] ? 2 : 0,
                            borderColor: countColors[i]
                        }
                    })),
                    label: {show: true, position: 'right', fontSize: 11},
                    cursor: 'pointer'
                }]
            }, true);

            // 平均阅读量条形图
            const readData = currentAccount === '全部账号' ? rawData.rank_by_read :
                rawData.rank_by_read.filter(d => d.所属公众号 === currentAccount);
            const readNames = readData.map(d => d.栏目名称).reverse();
            const readValues = readData.map(d => d.平均阅读量).reverse();
            const readColors = readData.map(d => d.颜色).reverse();

            readBarChart.setOption({
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {type: 'shadow'},
                    formatter: function(params) {
                        const d = readData.find(item => item.栏目名称 === params[0].name);
                        return '<div style="font-weight:600;margin-bottom:4px">' + d.栏目名称 + '</div>' +
                                '<div>所属公众号：' + d.所属公众号 + '</div>' +
                                '<div>月发布频次：' + d.月发布频次 + '篇</div>' +
                                '<div>平均阅读量：' + d.平均阅读量 + '</div>';
                    }
                },
                grid: {left: 120, right: 40, top: 10, bottom: 30},
                xAxis: {type: 'value', name: '平均阅读量'},
                yAxis: {type: 'category', data: readNames, axisLabel: {fontSize: 11}},
                series: [{
                    type: 'bar',
                    data: readValues.map((v, i) => ({
                        value: v,
                        itemStyle: {
                            color: highlightCol === readNames[i] ? readColors[i] : readColors[i] + '99',
                            borderWidth: highlightCol === readNames[i] ? 2 : 0,
                            borderColor: readColors[i]
                        }
                    })),
                    label: {show: true, position: 'right', fontSize: 11},
                    cursor: 'pointer'
                }]
            }, true);

            // 点击条形高亮桑基图
            countBarChart.off('click');
            countBarChart.on('click', function(params) {
                highlightColumn(params.name);
            });
            readBarChart.off('click');
            readBarChart.on('click', function(params) {
                highlightColumn(params.name);
            });
        }

        // 高亮指定栏目
        function highlightColumn(colName) {
            renderBars(colName);
            // 高亮桑基图对应节点
            sankeyChart.dispatchAction({
                type: 'highlight',
                seriesIndex: 0,
                name: colName
            });
            setTimeout(() => {
                sankeyChart.dispatchAction({
                    type: 'downplay',
                    seriesIndex: 0
                });
            }, 3000);
        }

        // 筛选按钮事件
        filterContainer.addEventListener('click', function(e) {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentAccount = e.target.dataset.account;
                renderSankey(currentAccount);
                renderBars();
            }
        });

        // 响应式
        window.addEventListener('resize', function() {
            sankeyChart.resize();
            countBarChart.resize();
            readBarChart.resize();
        });

        // 初始渲染
        renderSankey('全部账号');
        renderBars();
    </script>
</body>
</html>
