function mk(t,a,p){const e=document.createElementNS(ns,t);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));if(p)p.appendChild(e);return e;}

mk('text',{x:DX,y:14,'text-anchor':'middle','font-size':'11','font-weight':'500',fill:'var(--color-text-secondary)'},svg).textContent='药品（关联KOL数）';
mk('text',{x:KX,y:14,'text-anchor':'middle','font-size':'11','font-weight':'500',fill:'var(--color-text-secondary)'},svg).textContent='KOL（被关联次数）';

const pByD={},pByK={};
LINKS.forEach(l=>{
  const y1=dY[l.d],y2=kY[l.k]; if(!y1||!y2) return;
  const col=COL[l.d]||'#888',cx=(DX+KX)/2;
  const p=mk('path',{d:`M${DX},${y1} C${cx},${y1} ${cx},${y2} ${KX},${y2}`,fill:'none',stroke:col,'stroke-width':l.c>1?2:1,opacity:'0.25'},svg);
  if(!pByD[l.d])pByD[l.d]=[];pByD[l.d].push({p,l});
  if(!pByK[l.k])pByK[l.k]=[];pByK[l.k].push({p,l});
});

DRUGS.forEach(d=>{
  const y=dY[d.n],col=COL[d.n]||'#888';
  const g=mk('g',{style:'cursor:pointer'},svg);
  mk('text',{x:DX-9,y,'text-anchor':'end','font-size':'11',fill:'var(--color-text-primary)','dominant-baseline':'middle'},g).textContent=d.n;
  mk('circle',{cx:DX,cy:y,r:'5',fill:col},g);
  mk('text',{x:DX+9,y,'font-size':'9',fill:col,'dominant-baseline':'middle'},g).textContent=d.kc+'位';
  g.addEventListener('click',()=>onDrug(d.n,col));
});
KOLS.forEach(k=>{
  const y=kY[k.n],hi=k.t>1;
  const g=mk('g',{style:'cursor:pointer'},svg);
  mk('circle',{cx:KX,cy:y,r:hi?4:2.5,fill:hi?'#534AB7':'#B4B2A9'},g);
  mk('text',{x:KX+8,y,'font-size':hi?10:9,fill:hi?'var(--color-text-primary)':'var(--color-text-secondary)','dominant-baseline':'middle'},g).textContent=k.n+(k.t>1?' ×'+k.t:'');
  g.addEventListener('click',()=>onKol(k.n,k.t));
});

let sel=null;
function resetAll(){
  Object.values(pByD).flat().forEach(({p,l})=>{p.setAttribute('opacity','0.25');p.setAttribute('stroke-width',l.c>1?2:1);});
  document.getElementById('dp').classList.remove('show'); sel=null;
}
function dimAll(){Object.values(pByD).flat().forEach(({p})=>p.setAttribute('opacity','0.03'));}

function showPanel(dot,name,sub,tags){
  document.getElementById('dp-dot').style.background=dot;
  document.getElementById('dp-name').textContent=name;
  document.getElementById('dp-sub').textContent=sub;
  const grid=document.getElementById('dp-grid'); grid.innerHTML='';
  tags.forEach(t=>{
    const el=document.createElement('span'); el.className='dp-tag';
    el.style.background=t.col+'22'; el.style.color=t.col;
    el.innerHTML=`${t.label}<span class="cnt-badge">${t.cnt}次</span>`;
    el.addEventListener('click',t.fn);
    grid.appendChild(el);
  });
  document.getElementById('dp').classList.add('show');
}

function onDrug(name,col){
  if(sel===name){resetAll();return;} sel=name; dimAll();
  (pByD[name]||[]).forEach(({p,l})=>{p.setAttribute('opacity','0.9');p.setAttribute('stroke-width',l.c>1?3:2);});
  const ls=LINKS.filter(l=>l.d===name);
  showPanel(col,name,`关联 ${ls.length} 位KOL`,ls.map(l=>({label:l.k,col,cnt:l.c,fn:()=>onKol(l.k,KOLS.find(x=>x.n===l.k)?.t||1)})));
}
function onKol(name,total){
  if(sel==='k:'+name){resetAll();return;} sel='k:'+name; dimAll();
  (pByK[name]||[]).forEach(({p,l})=>{p.setAttribute('opacity','0.9');p.setAttribute('stroke-width',l.c>1?3:2);});
  const ls=LINKS.filter(l=>l.k===name);
  showPanel('#534AB7',name,`被关联 ${total} 次 · 涉及 ${ls.length} 个药品`,ls.map(l=>({label:l.d,col:COL[l.d]||'#888',cnt:l.c,fn:()=>onDrug(l.d,COL[l.d]||'#888')})));
}
document.getElementById('dp-x').addEventListener('click',resetAll);

const leg=document.getElementById('leg');
Object.entries(COL).forEach(([d,c])=>{leg.innerHTML+=`<span class="li"><span class="ls" style="background:${c}"></span>${d}</span>`;});
</script>
