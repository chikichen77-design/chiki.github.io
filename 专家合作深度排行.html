<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOL×品牌合作 - 专家合作深度排行</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f5f7fa;
    color: #333;
    min-height: 100vh;
}
.header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 20px 32px;
}
.breadcrumb { font-size: 12px; opacity: 0.9; margin-bottom: 6px; }
.breadcrumb .plugin-tag {
    background: rgba(255,255,255,0.25);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    margin-left: 6px;
}
.header h1 { font-size: 22px; font-weight: 700; }
.controls {
    background: white;
    padding: 14px 32px;
    display: flex;
    gap: 18px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid #e8e8e8;
}
.control-group { display: flex; align-items: center; gap: 8px; }
.control-group label { font-size: 13px; color: #666; white-space: nowrap; font-weight: 500; }
.control-group select, .control-group input[type="text"] {
    padding: 6px 12px;
    border: 1px solid #d9d9d9;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    background: white;
}
.control-group input[type="text"] { width: 220px; }
.control-group input[type="text"]:focus, .control-group select:focus { border-color: #667eea; }

.kpi-row {
    display: flex;
    gap: 16px;
    padding: 16px 32px;
    flex-wrap: wrap;
}
.kpi-card {
    background: white;
    border-radius: 10px;
    padding: 18px 24px;
    flex: 1;
    min-width: 180px;
    border-top: 3px solid #667eea;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.kpi-card.alt { border-top-color: #F6BD16; }
.kpi-card.alt2 { border-top-color: #5B8FF9; }
.kpi-card .value { font-size: 30px; font-weight: 700; line-height: 1.2; }
.kpi-card .label { font-size: 12px; color: #888; margin-top: 4px; }

.main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 0 32px 16px;
}
.panel {
    background: white;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    overflow: hidden;
}
.panel-header {
    padding: 12px 20px;
    border-bottom: 1px solid #f0f0f0;
    background: #fafbfc;
}
.panel-title {
    font-size: 15px;
    font-weight: 700;
    padding-left: 10px;
    border-left: 4px solid #667eea;
    line-height: 1.2;
}
.panel-title.drug { border-left-color: #F6BD16; }
.panel-subtitle { font-size: 12px; color: #888; margin-top: 4px; padding-left: 14px; }

.row {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid #f5f5f5;
    gap: 12px;
}
.row:hover { background: #fafbff; }
.row:last-child { border-bottom: none; }
.rank {
    width: 36px;
    text-align: right;
    font-size: 14px;
    color: #999;
    font-weight: 600;
    flex-shrink: 0;
}
.rank.gold { color: #d4a017; font-weight: 700; }
.name {
    width: 120px;
    font-size: 14px;
    font-weight: 600;
    color: #333;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.bar-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 80px;
}
.bar {
    height: 10px;
    background: linear-gradient(90deg, #5B5BD6 0%, #7B7BD8 100%);
    border-radius: 5px;
    min-width: 12px;
    flex: 1;
}
.bar.gold { background: linear-gradient(90deg, #d4a017 0%, #e8b830 100%); }
.bar.yellow { background: linear-gradient(90deg, #F6BD16 0%, #FFD43B 100%); }
.count {
    font-size: 13px;
    font-weight: 700;
    color: #333;
    flex-shrink: 0;
    min-width: 50px;
    text-align: right;
}
.count .unit { font-size: 11px; color: #888; font-weight: 400; margin-left: 2px; }
.tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    flex: 2;
    min-width: 100px;
    max-height: 60px;
    overflow: hidden;
}
.tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 11px;
    white-space: nowrap;
    line-height: 1.5;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    border: 1.5px solid transparent;
}
.tag:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    filter: brightness(1.08);
}
.tag:active {
    transform: translateY(0);
}
.tag.active {
    border-color: #667eea !important;
    box-shadow: 0 0 0 2px rgba(102,126,234,0.3);
    font-weight: 700;
}
.tag.d1 { background: #E8DAEF; color: #6c3483; }
.tag.d2 { background: #D5F5E3; color: #1e8449; }
.tag.d3 { background: #FADBD8; color: #c0392b; }
.tag.d4 { background: #D6EAF8; color: #2874a6; }
.tag.d5 { background: #FCF3CF; color: #9a7d0a; }
.tag.d6 { background: #F5CBA7; color: #a04000; }
.tag.d7 { background: #ABEBC6; color: #196f3d; }
.tag.d8 { background: #AED6F1; color: #1f618d; }
.tag.more { background: #f0f0f0; color: #888; }
.search-hl { background: #FFF59D; padding: 0 2px; border-radius: 2px; }
.filter-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 8px 32px;
    background: #f0f4ff;
    border-bottom: 1px solid #d0d8f0;
}
.clear-btn {
    margin-left: auto;
    padding: 4px 14px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
}
.clear-btn:hover { background: #5a6fd8; }

.group-section {
    padding: 0 20px 12px;
}
.group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: #f8f9fa;
    border-radius: 6px;
    margin-top: 10px;
}
.group-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
}
.group-count { font-size: 12px; color: #666; }
.group-names {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 12px;
    padding: 8px 12px;
    font-size: 12px;
    line-height: 1.6;
}
.bottom-panel {
    margin: 0 32px 24px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    overflow: hidden;
}
.footer {
    text-align: center;
    padding: 16px;
    color: #999;
    font-size: 12px;
}
@media (max-width: 980px) {
    .main-grid { grid-template-columns: 1fr; }
    .name { width: 100px; }
}
</style>
</head>
<body>

<div class="header">
    <div class="breadcrumb">3.6.2 KOL×品牌合作-专家合作深度 <span class="plugin-tag">插件</span></div>
    <h1 id="mainTitle">商业化KOL合作排行</h1>
</div>

<div class="controls">
    <div class="control-group">
        <label>显示合作频次≥:</label>
        <select id="freqFilter">
            <option value="1">1次</option>
            <option value="2" selected>2次</option>
            <option value="3">3次</option>
        </select>
    </div>
    <div class="control-group">
        <label>Top显示数量:</label>
        <select id="topN">
            <option value="10" selected>前10位</option>
            <option value="15">前15位</option>
            <option value="20">前20位</option>
            <option value="30">前30位</option>
        </select>
    </div>
    <div class="control-group">
        <label>搜索:</label>
        <input type="text" id="searchInput" placeholder="输入KOL或药品名称...">
    </div>
    <div class="control-group" style="margin-left:auto;color:#999;font-size:12px;">
        点击标签/名称可快速筛选，再次点击取消
    </div>
</div>

<div class="filter-bar" id="filterBar"></div>

<div class="kpi-row" id="kpiRow"></div>

<div class="main-grid">
    <div class="panel">
        <div class="panel-header">
            <div class="panel-title">专家排行（按关联药品数）</div>
            <div class="panel-subtitle" id="kolSubtitle"></div>
        </div>
        <div id="kolSection"></div>
    </div>
    <div class="panel">
        <div class="panel-header">
            <div class="panel-title drug">药品品牌排行（按关联KOL数）</div>
            <div class="panel-subtitle" id="drugSubtitle"></div>
        </div>
        <div id="drugSection"></div>
    </div>
</div>

<div class="panel bottom-panel">
    <div class="panel-header">
        <div class="panel-title">合作频次 1次 KOL - 按品牌聚合</div>
        <div class="panel-subtitle" id="groupSubtitle"></div>
    </div>
    <div id="groupSection"></div>
</div>

<div class="footer">
    数据来源: 商业化，药品×KOL 0703.xlsx | 筛选条件: 商业化合作=商业化, 药品名称≠无/空, KOL姓名≠无/空
</div>

    const totalKOLs = rawData.total_kols;
    const maxFreq = rawData.kol_ranked.length > 0 ? rawData.kol_ranked[0].drug_count : 0;
    const kol1 = rawData.kol_ranked.filter(k => k.drug_count === 1).length;
    const pct = (kol1 / totalKOLs * 100).toFixed(0);
    document.getElementById('kpiRow').innerHTML = `
        <div class="kpi-card">
            <div class="value">${totalKOLs}</div>
            <div class="label">商业化合作KOL总数</div>
        </div>
        <div class="kpi-card alt">
            <div class="value">${maxFreq}</div>
            <div class="label">最高合作频次上限</div>
        </div>
        <div class="kpi-card alt2">
            <div class="value">${pct}%</div>
            <div class="label">KOL仅合作1次占比</div>
        </div>
    `;
}

function renderKOLPanel() {
    const minFreq = parseInt(document.getElementById('freqFilter').value);
    const topN = parseInt(document.getElementById('topN').value);
    const kw = document.getElementById('searchInput').value.trim().toLowerCase();

    let kols = rawData.kol_ranked.filter(k => k.drug_count >= minFreq);
    if (kw) {
        kols = kols.filter(k =>
            k.name.toLowerCase().includes(kw) ||
            k.drugs.some(d => d.toLowerCase().includes(kw))
        );
    }

    document.getElementById('kolSubtitle').textContent =
        `共${kols.length}位KOL，展示前${Math.min(topN, kols.length)}位及品牌关联`;

    if (kols.length === 0) {
        document.getElementById('kolSection').innerHTML =
            '<div style="padding:40px;text-align:center;color:#999;">无符合条件的KOL</div>';
        return;
    }

    const maxD = kols[0].drug_count;
    const top = kols.slice(0, topN);
    document.getElementById('kolSection').innerHTML = top.map((k, i) => {
        const rank = i + 1;
        const isFirst = rank === 1;
        const barW = Math.max(15, (k.drug_count / maxD) * 100);
        const tags = k.drugs.map(d => `<span class="tag ${dc(d)}${isActiveTag('drug', d)}" ${tagAttrs('drug', d)}>${hl(d, kw)}</span>`).join('');
        return `<div class="row">
            <div class="rank ${isFirst?'gold':''}">${rank}</div>
            <div class="name${isActiveTag('kol', k.name) ? ' search-hl' : ''}" title="${esc(k.name)}" style="cursor:pointer" onclick="onTagClick('kol','${escAttr(k.name)}')">${hl(k.name, kw)}</div>
            <div class="bar-wrap">
                <div class="bar ${isFirst?'gold':''}" style="width:${barW}%;"></div>
                <div class="count">${k.drug_count}<span class="unit">次</span></div>
            </div>
            <div class="tags">${tags}</div>
        </div>`;
    }).join('');
}

function renderDrugPanel() {
    const topN = parseInt(document.getElementById('topN').value);
    const kw = document.getElementById('searchInput').value.trim().toLowerCase();

    let drugs = rawData.drug_ranked.slice();
    if (kw) {
        drugs = drugs.filter(d =>
            d.name.toLowerCase().includes(kw) ||
            d.kols.some(k => k.toLowerCase().includes(kw))
        );
    }

    document.getElementById('drugSubtitle').textContent =
        `共${drugs.length}个药品，展示前${Math.min(topN, drugs.length)}个及关联专家数`;

    if (drugs.length === 0) {
        document.getElementById('drugSection').innerHTML =
            '<div style="padding:40px;text-align:center;color:#999;">无符合条件的药品</div>';
        return;
    }

    const maxK = drugs[0].kol_count;
    const top = drugs.slice(0, topN);
    document.getElementById('drugSection').innerHTML = top.map((d, i) => {
        const rank = i + 1;
        const isFirst = rank === 1;
        const barW = Math.max(15, (d.kol_count / maxK) * 100);
        const top5 = d.kols.slice(0, 5).map(k => `<span class="tag d1${isActiveTag('kol', k)}" ${tagAttrs('kol', k)}>${hl(k, kw)}</span>`).join('');
        const more = d.kols.length > 5 ? `<span class="tag more" onclick="onTagClick('drug','${escAttr(d.name)}')">+${d.kols.length - 5}位</span>` : '';
        return `<div class="row">
            <div class="rank ${isFirst?'gold':''}">${rank}</div>
            <div class="name${isActiveTag('drug', d.name) ? ' search-hl' : ''}" title="${esc(d.name)}" style="cursor:pointer" onclick="onTagClick('drug','${escAttr(d.name)}')">${hl(d.name, kw)}</div>
            <div class="bar-wrap">
                <div class="bar ${isFirst?'yellow':''}" style="width:${barW}%;"></div>
                <div class="count">${d.kol_count}<span class="unit">位专家</span></div>
            </div>
            <div class="tags">${top5}${more}</div>
        </div>`;
    }).join('');
}

function renderGroupPanel() {
    const kw = document.getElementById('searchInput').value.trim().toLowerCase();

    let kols = rawData.kol_ranked.filter(k => k.drug_count === 1);
    if (kw) {
        kols = kols.filter(k =>
            k.name.toLowerCase().includes(kw) ||
            k.drugs.some(d => d.toLowerCase().includes(kw))
        );
    }

    document.getElementById('groupSubtitle').textContent =
        `${kols.length}位KOL仅出现1次，按所合作药品分组展示`;

    if (kols.length === 0) {
        document.getElementById('groupSection').innerHTML =
            '<div style="padding:40px;text-align:center;color:#999;">无符合条件的KOL</div>';
        return;
    }

    const drugMap = {};
    kols.forEach(k => {
        k.drugs.forEach(d => {
            if (!drugMap[d]) drugMap[d] = [];
            drugMap[d].push(k.name);
        });
    });
    const entries = Object.entries(drugMap).sort((a, b) => b[1].length - a[1].length);

    document.getElementById('groupSection').innerHTML = entries.map(([drug, list]) => {
        const names = list.map(n => `<span class="tag d2${isActiveTag('kol', n)}" ${tagAttrs('kol', n)}>${hl(n, kw)}</span>`).join(' ');
        return `<div class="group-section">
            <div class="group-header">
                <span class="group-tag tag ${dc(drug)}${isActiveTag('drug', drug)}" ${tagAttrs('drug', drug)}>${hl(drug, kw)}</span>
                <span class="group-count">${list.length}位专家</span>
            </div>
            <div class="group-names">${names}</div>
        </div>`;
    }).join('');
}

function renderAll() {
    renderKPIs();
    renderKOLPanel();
    renderDrugPanel();
    renderGroupPanel();
    renderFilterBar();
}

function renderFilterBar() {
    const bar = document.getElementById('filterBar');
    if (!selectedTag) {
        bar.style.display = 'none';
        return;
    }
    bar.style.display = 'flex';
    const typeLabel = selectedTag.type === 'drug' ? '药品' : '专家';
    bar.innerHTML = `
        <span style="font-size:13px;color:#666;">已选中筛选：</span>
        <span class="tag ${dc(selectedTag.name)} active">${esc(selectedTag.name)}</span>
        <span style="font-size:12px;color:#999;">（${typeLabel}）</span>
        <button class="clear-btn" onclick="clearFilter()">清除筛选</button>
    `;
}

function clearFilter() {
    selectedTag = null;
    document.getElementById('searchInput').value = '';
    renderAll();
}

document.getElementById('freqFilter').addEventListener('change', renderAll);
document.getElementById('topN').addEventListener('change', renderAll);
document.getElementById('searchInput').addEventListener('input', function() {
    selectedTag = null;
    renderAll();
});

renderAll();
</script>

</body>
</html>
