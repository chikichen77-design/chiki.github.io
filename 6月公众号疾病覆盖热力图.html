function getCoverageLevel(count) {
  if (count >= 2) return 'strong';
  if (count === 1) return 'medium';
  return 'none';
}

function getCoverageInfo(count) {
  if (count >= 2) return { label: '强覆盖', color: 'text-red-600' };
  if (count === 1) return { label: '中覆盖', color: 'text-orange-600' };
  return { label: '未覆盖', color: 'text-gray-400' };
}

function getCount(disease, accountKey) {
  if (accountKey === 'all') return disease.platformMentions;
  return disease[accountKey] || 0;
}

      html += '<div class="flex items-center gap-1.5">';
      html += '<span class="w-2 h-2 rounded-sm ' + catConfig.color + '"></span>';
      html += '<span class="text-sm font-medium text-gray-800">' + catConfig.label + '</span>';
      html += '</div>';
      html += '<div class="text-xs text-gray-500 mt-0.5">' + catConfig.desc + '</div>';
      html += '</div>';
      
      html += '<div class="bg-gray-50 rounded-lg p-3">';
      html += '<div class="text-xs text-gray-500 mb-1">全平台提及</div>';
      html += '<div class="text-2xl font-bold tabular-nums text-blue-600">' + d.platformMentions + '</div>';
      html += '<div class="text-xs text-gray-500">篇</div>';
      html += '</div>';
      html += '</div>';
      
      // Coverage level
      html += '<div>';
      html += '<div class="text-xs text-gray-500 font-medium mb-2">覆盖强度<span class="font-normal text-gray-400 ml-1">（按当前账号发文数）</span></div>';
      html += '<div class="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-2">';
      html += '<span class="text-sm text-gray-700">' + covInfo.label + '</span>';
      html += '<div class="flex items-center gap-2">';
      html += '<span class="text-sm font-semibold tabular-nums text-gray-800 w-8 text-right">' + count + '</span>';
      html += '<span class="text-xs text-gray-500">篇</span>';
      html += '</div>';
      html += '</div>';
      html += '</div>';
      
      // Per-account details
      html += '<div>';
      html += '<div class="text-xs text-gray-500 font-medium mb-2">各账号覆盖详情</div>';
      html += '<div class="space-y-1.5">';
      accountDetails.forEach(function(a) {
        var aCov = getCoverageInfo(a.count);
        html += '<div class="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-2">';
        html += '<span class="text-sm text-gray-700 truncate flex-1 min-w-0 mr-2">' + a.label + '</span>';
        html += '<div class="flex items-center gap-2 shrink-0">';
        html += '<span class="text-xs ' + aCov.color + '">' + aCov.label + '</span>';
        html += '<span class="text-sm font-semibold tabular-nums text-gray-800 w-8 text-right">' + a.count + '</span>';
        html += '<span class="text-xs text-gray-500">篇</span>';
        html += '</div>';
        html += '</div>';
      });
      html += '</div>';
      html += '</div>';
      
      html += '</div>'; // close space-y-4
      
      // Modal footer
      html += '<div class="px-5 py-3 border-t border-gray-100 flex justify-end">';
      html += '<button type="button" onclick="closeDisease()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">关闭</button>';
      html += '</div>';
      
      html += '</div>'; // close modal content
      html += '</div>'; // close overlay
    }
  }
  
  root.innerHTML = html;
}

function selectAccount(key) {
  selectedAccount = key;
  render();
}

function selectCoverage(key) {
  coverageFilter = key;
  render();
}

function openDisease(name) {
  selectedDisease = name;
  render();
}

function closeDisease() {
  selectedDisease = null;
  render();
}

// Close modal on Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && selectedDisease) {
    closeDisease();
  }
});

// Initial render
render();
</script>

</body>
</html>
